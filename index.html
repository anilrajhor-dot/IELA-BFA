// ---------------- finance helpers ----------------
function pmt(principal, annualRatePct, months) {
  const r = (Number(annualRatePct) || 0) / 100 / 12;
  const p = Number(principal) || 0;
  const n = Number(months) || 0;
  if (!p || !n) return 0;
  if (r === 0) return p / n;
  const f = Math.pow(1 + r, n);
  return (p * r * f) / (f - 1);
}
function maxLoanFromEmi(emi, annualRatePct, months) {
  const r = (Number(annualRatePct) || 0) / 100 / 12;
  const e = Number(emi) || 0;
  const n = Number(months) || 0;
  if (!e || !n) return 0;
  if (r === 0) return e * n;
  const f = Math.pow(1 + r, n);
  return (e * (f - 1)) / (r * f);
}
function minTenure(principal, annualRatePct, emi) {
  const r = (Number(annualRatePct) || 0) / 100 / 12;
  const p = Number(principal) || 0;
  const e = Number(emi) || 0;
  if (!p || !e) return null;
  if (r === 0) return Math.ceil(p / e);
  if (e <= p * r) return null; // EMI can never cover interest — loan never pays off
  return Math.ceil(Math.log(e / (e - p * r)) / Math.log(1 + r));
}

const pct = (n) => (isFinite(n) ? n.toFixed(1) : "0.0") + "%";

const LocalStore = {
  async list(prefix) {
    const keys = Object.keys(localStorage).filter((k) => k.startsWith(prefix));
    return { keys };
  },
  async get(key) {
    const v = localStorage.getItem(key);
    if (v === null) throw new Error("not found");
    return { key, value: v };
  },
  async set(key, value) {
    localStorage.setItem(key, value);
    return { key, value };
  },
  async delete(key) {
    localStorage.removeItem(key);
    return { key, deleted: true };
  },
};

}

function NumInput({ value, onChange, prefix = "₹" }) {

        placeholder="0"
      />
    </div>
  );
}
function TextInput({ value, onChange, placeholder }) {
  return (
    <input

      value={value}
      placeholder={placeholder}
      onChange={(e) => onChange(e.target.value)}
      className="mt-1 w-full px-3 py-2 border border-stone-400 rounded-md bg-white outline-none focus:ring-2 focus:ring-amber-600 text-sm"
    />
  );
}
function DateInput({ value, onChange }) {

}
function SelectInput({ value, onChange, opts }) {
  return (

function AutoValue({ value }) {

function renderField(f, obj, setObj) {
  const set = (v) => setObj({ ...obj, [f.k]: v });
  return (
    <Field key={f.k} label={f.l} help={f.help} mandatory={f.mandatory}>
      {f.type === "number" ? <NumInput prefix={f.prefix || "₹"} value={obj[f.k]} onChange={set} />
        : f.type === "date" ? <DateInput value={obj[f.k]} onChange={set} />
        : f.type === "select" ? <SelectInput value={obj[f.k]} onChange={set} opts={f.opts} />
        : <TextInput value={obj[f.k]} onChange={set} placeholder={f.placeholder} />}
    </Field>
  );
}
function FieldGrid({ fields, obj, setObj }) {
  return <>{fields.map((f) => renderField(f, obj, setObj))}</>;

function NumRow({ f, obj, setObj }) {
  return (
    <label className="flex items-center justify-between gap-3 py-1.5 border-b border-stone-200 last:border-0">
      <span className="text-sm text-stone-800 flex-1">{f.l}</span>
      <input
        type="number"
        value={obj[f.k]}
        onChange={(e) => setObj({ ...obj, [f.k]: e.target.value })}
        className="w-28 px-2 py-1 border border-stone-400 rounded-md bg-white outline-none focus:ring-2 focus:ring-amber-600 font-mono text-sm text-right"
        placeholder="0"
      />
    </label>
  );
}
function NumList({ fields, obj, setObj, extraRow, extraRows }) {
  const rows = extraRows || (extraRow ? [extraRow] : []);
  return (
    <div className="bg-white rounded-lg border border-stone-300 px-3">
      {fields.map((f) => <NumRow key={f.k} f={f} obj={obj} setObj={setObj} />)}
      {rows.map((r, i) => (
        <div key={i} className="flex items-center justify-between gap-3 py-1.5 bg-red-50 -mx-3 px-3">
          <span className="text-sm text-stone-800 flex-1">{r.label}</span>
          <span className="text-sm font-mono font-semibold text-red-700">{r.value}</span>
        </div>
      ))}
    </div>
  );
}

function findLocalAnswer(question, issues) {
  const q = question.toLowerCase();

  // Questions about data problems/discrepancies pull live from the Checks engine.
  if (/(difference|discrepanc|mismatch|wrong|error|issue|problem|check my data|any issues|data correct|consistent)/.test(q)) {
    if (!issues || issues.length === 0) {
      return "I checked your data — no issues found right now. Figures are consistent and mandatory fields look complete. (You can always open the clipboard ✓ icon in the header for the full Checks list.)";
    }
    const top = issues.slice(0, 5);
    const lines = top.map((iss, i) => `${i + 1}. ${iss.title} — ${iss.fix}`);
    const more = issues.length > 5 ? `\n…and ${issues.length - 5} more. See the clipboard ✓ icon in the header for the full list.` : "";
    return `I found ${issues.length} thing${issues.length > 1 ? "s" : ""} worth checking:\n\n${lines.join("\n")}${more}`;
  }

  for (const entry of CHAT_KB) {
    if (entry.k.some((kw) => q.includes(kw))) return entry.a;
  }

  return "I don't have a ready answer for that in offline mode — try asking about margin money, DSCR/FOIR, the balance sheet, working capital methods, sharing/printing, or tap 'Are there any issues with my data?' to check your figures. You can also browse the clipboard ✓ (Checks) or the field help icons (?) around the form.";
}

function ChatWidget({ open, onClose, contextSummary, step, issues }) {
  const [messages, setMessages] = useState([
    { role: "assistant", text: "Namaste! I can help you understand this form and check your data — fully offline, no internet needed. Ask me anything, by typing or tapping the mic to speak." },
  ]);
  const [input, setInput] = useState("");
  const [listening, setListening] = useState(false);
  const [error, setError] = useState("");
  const recognitionRef = useRef(null);

  function toggleMic() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      setError("Voice input isn't supported on this browser — please type your question instead.");
      return;
    }
    if (listening) {
      recognitionRef.current && recognitionRef.current.stop();
      setListening(false);
      return;
    }
    const rec = new SR();
    rec.lang = "en-IN";
    rec.interimResults = false;
    rec.maxAlternatives = 1;
    rec.onresult = (e) => {
      const transcript = e.results[0][0].transcript;
      setInput((prev) => (prev ? prev + " " : "") + transcript);
    };
    rec.onerror = () => setListening(false);
    rec.onend = () => setListening(false);
    recognitionRef.current = rec;
    setError("");
    setListening(true);
    rec.start();
  }

  function send(text) {
    const q = (text || input).trim();
    if (!q) return;
    const answer = findLocalAnswer(q, issues);
    setMessages((cur) => [...cur, { role: "user", text: q }, { role: "assistant", text: answer }]);
    setInput("");
  }

  if (!open) return null;
  return (
    <div className="fixed inset-0 z-40 no-print flex items-end justify-center sm:items-center">
      <div className="absolute inset-0 bg-black bg-opacity-30" onClick={onClose} />
      <div className="relative w-full sm:max-w-md bg-stone-100 rounded-t-2xl sm:rounded-2xl shadow-xl flex flex-col overflow-hidden" style={{ height: "80vh" }}>
        <div className="bg-emerald-900 text-stone-50 px-4 py-3 flex items-center justify-between">
          <div className="flex items-center gap-2">
            <Icon name="chat" size={18} className="text-amber-400" />
            <span className="serif font-bold text-sm">Ask the Credit Advisor</span>
          </div>
          <button onClick={onClose}><Icon name="close" size={18} /></button>
        </div>
        <div className="flex-1 overflow-y-auto px-3 py-3 space-y-2">
          {messages.map((m, i) => (
            <div key={i} className={`max-w-xs rounded-lg px-3 py-2 text-sm whitespace-pre-wrap ${m.role === "user" ? "bg-emerald-900 text-stone-50 ml-auto" : "bg-white border border-stone-300 text-emerald-900"}`}>
              {m.text}
            </div>
          ))}
          {error && <Banner tone="danger">{error}</Banner>}
        </div>
        <div className="px-3 pb-2 flex gap-2 flex-wrap">
          {(SUGGESTED_QUESTIONS[step] || []).map((q) => (
            <button key={q} onClick={() => send(q)} className="text-xs px-2 py-1 rounded-full border border-stone-400 text-stone-600 bg-white hover:bg-stone-200">
              {q}
            </button>
          ))}
        </div>
        <div className="border-t border-stone-300 p-2 flex gap-2 bg-white">
          <button
            onClick={toggleMic}
            className={`px-3 py-2 rounded-md ${listening ? "bg-red-600 text-white animate-pulse" : "bg-stone-200 text-emerald-900"}`}
            aria-label={listening ? "Stop listening" : "Speak your question"}
          >
            {listening ? <Icon name="mic_off" size={16} /> : <Icon name="mic" size={16} />}
          </button>
          <input
            value={input}
            onChange={(e) => setInput(e.target.value)}
            onKeyDown={(e) => e.key === "Enter" && send()}
            placeholder={listening ? "Listening…" : "Ask a question or tap the mic…"}
            className="flex-1 px-3 py-2 rounded-md border border-stone-400 outline-none text-sm"
          />
          <button onClick={() => send()} className="px-3 py-2 rounded-md bg-amber-600 text-white">
            <Icon name="send" size={16} />
          </button>
        </div>
      </div>
    </div>
  );
}

  if (!open) return null;
  const dangerCount = issues.filter((i) => i.tone === "danger").length;
  const warnCount = issues.filter((i) => i.tone === "warn").length;
  const overall = dangerCount > 0 ? { tone: "danger", label: "Needs Attention / ध्यान देने की आवश्यकता" } : warnCount > 0 ? { tone: "warn", label: "Minor Issues / मामूली समस्याएं" } : { tone: "ok", label: "Good / ठीक है" };
  return (
    <div className="fixed inset-0 z-40 no-print flex items-end justify-center sm:items-center">
      <div className="absolute inset-0 bg-black bg-opacity-30" onClick={onClose} />

          <div className="flex items-center gap-2">
            <Icon name="checklist" size={18} className="text-amber-400" />
            <span className="serif font-bold text-sm">Health Check / स्वास्थ्य जांच</span>

          <div className="mb-3">

              Overall: {overall.label} — {issues.length} item{issues.length === 1 ? "" : "s"} found ({dangerCount} serious, {warnCount} minor).
            </Banner>
          </div>
          {issues.length === 0 ? (
            <Banner tone="ok">No issues found — figures are consistent and mandatory fields are complete. / कोई समस्या नहीं मिली।</Banner>
          ) : (

  }, [loanF.totalProjectCost, loanF.marginMoney]);

  useEffect(() => {
    if (tl.quotedPrice !== "" && tl.tlAmount === "") {
      setTl((t) => (t.tlAmount !== "" ? t : { ...t, tlAmount: Math.round(num(t.quotedPrice) * 0.9) }));
    }
  }, [tl.quotedPrice]);

  // ---------------- calculations ----------------
  const calc = useMemo(() => {
    // H1 sales & purchases
    const rows = ["high", "low", "avg"].map((key) => {
      const r = h1[key];
      const avgMonthlySale = r.dailySale !== "" ? num(r.dailySale) * 30 : num(r.avgMonthlySaleManual);
      const salesForPeriod = avgMonthlySale * num(r.months);
      const avgMonthlyPurchases = avgMonthlySale * (1 - num(r.margin) / 100);
      const totalPurchases = avgMonthlyPurchases * num(r.months);
      const totalOtherIncome = num(r.otherInc) * num(r.months);
      return { key, months: num(r.months), avgMonthlySale, salesForPeriod, totalPurchases, totalOtherIncome };
    });
    const totalMonths = sum(...rows.map((r) => r.months));
    const totalSales = sum(...rows.map((r) => r.salesForPeriod));
    const totalPurchases = sum(...rows.map((r) => r.totalPurchases));
    const totalOtherIncome = sum(...rows.map((r) => r.totalOtherIncome));
    const avgMonthlySaleTotal = totalMonths ? totalSales / totalMonths : 0;
    const blendedMargin = totalSales ? ((totalSales - totalPurchases) / totalSales) * 100 : 0;

    // H2 income & expenditure
    const expenditureSum = sum(...Object.values(h2));
    const totalExpenditure = totalPurchases + expenditureSum;
    const totalIncome = totalSales + totalOtherIncome + num(govtSubsidy);
    const netProfit = totalIncome - totalExpenditure;
    const netMargin = totalSales ? (netProfit / totalSales) * 100 : 0;
    // Closing Stock is auto-linked from the Balance Sheet's stock values (Step 3, H3) — no need to enter it twice.
    const closingStock = num(h3.rawMaterialStock) + num(h3.finishedGoodsStock);
    const cogs = num(openingStock) + totalPurchases - closingStock;
    const grossProfit = totalSales - cogs;
    const grossMargin = totalSales ? (grossProfit / totalSales) * 100 : 0;
    const avgMonthlyNetProfit = netProfit / 12;

    // H3 balance sheet
    const totalCL = sum(num(credit.shgLoanOutstanding), num(credit.informalLoan), ...CL_FIELDS.map((f) => h3[f.k]));
    const totalLTL = sum(num(credit.bankLoanOutstanding), ...LTL_FIELDS.map((f) => h3[f.k]));
    const totalCA = sum(num(credit.cumulativeShgSavings), num(credit.ownSbSavings), num(credit.fdRd), num(credit.otherSavings), ...CA_FIELDS.map((f) => h3[f.k]));
    const totalFA = sum(...FA_FIELDS.map((f) => h3[f.k]));
    const totalOA = sum(...OA_FIELDS.map((f) => h3[f.k]));
    const totalAssets = totalCA + totalFA + totalOA;
    // Owner's Capital = Total Assets − Total Liabilities other than capital (i.e. other than net worth)
    const ownersCapital = totalAssets - totalCL - totalLTL;
    const totalNetWorth = ownersCapital;
    const totalLiabilities = totalCL + totalLTL + totalNetWorth;
    const balances = Math.round(totalAssets) === Math.round(totalLiabilities); // true by construction — capital is the plug

    // Working Capital Assessment — Tandon Committee method (Method I & II) + Turnover method (Nayak Committee)
    const clBankBorrowings = num(h3.clBankLoanST) + num(credit.shgLoanOutstanding) + num(credit.bankLoanOutstanding);
    const clOtherThanBankBorrowings = totalCL - clBankBorrowings;
    const workingCapitalGap = totalCA - clOtherThanBankBorrowings;
    const tandonMethod1Mpbf = Math.max(workingCapitalGap, 0) * 0.75;
    const tandonMethod1Nwc = Math.max(workingCapitalGap, 0) * 0.25;
    const tandonMethod2Mpbf = Math.max(totalCA * 0.75 - clOtherThanBankBorrowings, 0);
    const tandonMethod2Nwc = totalCA * 0.25;

    const projectedTurnover = projectedTurnoverOverride !== "" ? num(projectedTurnoverOverride) : totalSales;
    const turnoverWcRequirement = projectedTurnover * 0.25;
    const turnoverMargin = projectedTurnover * 0.05;
    const turnoverBankFinance = projectedTurnover * 0.20;

    // Projections (recomputed correctly — see note to user about the original template's disconnected formulas)
    const opexY1 = totalExpenditure - totalPurchases; // operating expenditure excl. purchases
    const salesY2 = totalSales * (1 + proj.growthSalesY2 / 100);
    const salesY3 = salesY2 * (1 + proj.growthSalesY3 / 100);
    const opexY2 = opexY1 * (1 + proj.growthOpexY2 / 100);
    const opexY3 = opexY2 * (1 + proj.growthOpexY3 / 100);
    const purchasesY2 = salesY2 * (1 - blendedMargin / 100);
    const purchasesY3 = salesY3 * (1 - blendedMargin / 100);
    const annualEmi = num(loanF.proposedEmi) * 12;
    const netProfitY1 = netProfit;
    const netProfitY2 = salesY2 - purchasesY2 - opexY2;
    const netProfitY3 = salesY3 - purchasesY3 - opexY3;

    // Household
    const hhIncomeTotal = sum(...K2_INCOME_FIELDS.map((f) => hhInc[f.k]));
    const businessProfitLinked = Math.max(avgMonthlyNetProfit * 12, 0);
    const hhIncomeTotalWithBiz = hhIncomeTotal + businessProfitLinked;
    const hhExpTotal = sum(...K2_EXPENDITURE_FIELDS.map((f) => hhExp[f.k])) + num(credit.shgEmi) * 12 + num(credit.bankLoanEmi) * 12;
    const householdSurplusAnnual = hhIncomeTotalWithBiz - hhExpTotal;
    const monthlyHHIncome = hhIncomeTotalWithBiz / 12;
    const monthlyHHExpenditure = hhExpTotal / 12;
    const monthlyHouseholdSurplus = householdSurplusAnnual / 12;

    // K3 EMI schedule
    const totalMonthlyEmi = num(credit.shgEmi) + num(credit.bankLoanEmi) + num(loanF.proposedEmi);
    const netCashSurplusAfterAllEmis = monthlyHouseholdSurplus - num(loanF.proposedEmi);

    // EMI Feasibility (Sheet 6)
    const emiMonthlyHHIncome = emiL1.monthlyHHIncomeOverride !== "" ? num(emiL1.monthlyHHIncomeOverride) : monthlyHHIncome;
    const emiMonthlyHHExpenditureExclEmi = monthlyHHExpenditure - num(credit.shgEmi) - num(credit.bankLoanEmi);
    const emiMonthlyHHExpenditure = emiL1.monthlyHHExpenditureOverride !== "" ? num(emiL1.monthlyHHExpenditureOverride) : emiMonthlyHHExpenditureExclEmi;
    const existingEmiBank = emiL1.existingEmiBankOverride !== "" ? num(emiL1.existingEmiBankOverride) : num(credit.bankLoanEmi);
    const existingEmiShg = num(credit.shgEmi);
    const totalExistingEmi = existingEmiShg + existingEmiBank;

    const calculatedEmi = pmt(loanF.loanRequested, loanF.interestRate, loanF.tenureMonths);
    const surplusBeforeNewEmi = emiMonthlyHHIncome - emiMonthlyHHExpenditure - totalExistingEmi;
    const surplusAfterNewEmi = surplusBeforeNewEmi - calculatedEmi;
    const safeEmiCapacity = Math.max(surplusBeforeNewEmi, 0) * 0.5;
    const maxEligibleLoan = maxLoanFromEmi(safeEmiCapacity, loanF.interestRate, loanF.tenureMonths);
    const minTenureMonths = minTenure(loanF.loanRequested, loanF.interestRate, safeEmiCapacity);

    const foir = emiMonthlyHHIncome ? ((totalExistingEmi + calculatedEmi) / emiMonthlyHHIncome) * 100 : 0;
    const dscr = (totalExistingEmi + calculatedEmi) ? (surplusBeforeNewEmi + calculatedEmi + totalExistingEmi) / (totalExistingEmi + calculatedEmi) : 0;

    let recommendation = "Not Recommended";
    let tone = "danger";
    const loanReq = num(loanF.loanRequested);
    if (loanReq > 0 && loanReq <= maxEligibleLoan) { recommendation = "Recommend"; tone = "ok"; }
    else if (loanReq <= maxEligibleLoan * 1.1) { recommendation = "Recommend with Conditions"; tone = "warn"; }

    return {
      rows, totalSales, totalPurchases, totalOtherIncome, avgMonthlySaleTotal, blendedMargin,
      totalExpenditure, totalIncome, netProfit, netMargin, closingStock, cogs, grossProfit, grossMargin, avgMonthlyNetProfit,
      totalCL, totalLTL, totalCA, totalFA, totalOA, totalAssets, ownersCapital, totalNetWorth, totalLiabilities, balances,
      clOtherThanBankBorrowings, workingCapitalGap, tandonMethod1Mpbf, tandonMethod1Nwc, tandonMethod2Mpbf, tandonMethod2Nwc,
      projectedTurnover, turnoverWcRequirement, turnoverMargin, turnoverBankFinance,
      salesY2, salesY3, opexY2, opexY3, purchasesY2, purchasesY3, netProfitY1, netProfitY2, netProfitY3, annualEmi,
      hhIncomeTotalWithBiz, hhExpTotal, householdSurplusAnnual, monthlyHHIncome, monthlyHHExpenditure, monthlyHouseholdSurplus,
      totalMonthlyEmi, netCashSurplusAfterAllEmis,
      calculatedEmi, surplusBeforeNewEmi, surplusAfterNewEmi, safeEmiCapacity, maxEligibleLoan, minTenureMonths,
      foir, dscr, recommendation, tone, loanReq, totalExistingEmi, existingEmiShg, existingEmiBank, emiMonthlyHHExpenditureExclEmi,
    };
  }, [h1, h2, govtSubsidy, openingStock, h3, drawings, credit, proj, loanF, hhInc, hhExp, emiL1, projectedTurnoverOverride]);

  // Auto-suggest the proposed EMI from the PMT calculation once loan terms are entered (still overridable)
  useEffect(() => {
    if (loanF.proposedEmi === "" && calc.calculatedEmi > 0) {
      setLoanF((l) => (l.proposedEmi !== "" ? l : { ...l, proposedEmi: Math.round(calc.calculatedEmi) }));
    }
  }, [calc.calculatedEmi]);

  function loadScriptOnce(src) {
    return new Promise((resolve, reject) => {
      if (document.querySelector(`script[src="${src}"]`)) return resolve();
      const s = document.createElement("script");
      s.src = src;
      s.onload = () => resolve();
      s.onerror = () => reject(new Error("script load failed"));
      document.body.appendChild(s);
    });
  }

  async function shareAsPdf() {
    setPdfBusy(true);
    setShareStatus("");
    try {
      if (!(window.jspdf && window.jspdf.jsPDF)) {
        await loadScriptOnce("https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js");
      }
      if (!(window.jspdf && window.jspdf.jsPDF)) {
        setShareStatus("pdf-unavailable");
        return;
      }
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      const lines = buildReportText().split("\n");
      let y = 15;
      doc.setFontSize(13);
      doc.text(lines[0], 10, y);
      y += 8;
      doc.setFontSize(11);
      doc.text(lines[1], 10, y);
      y += 10;
      doc.setFontSize(10);
      for (let i = 3; i < lines.length; i++) {
        doc.text(lines[i], 10, y);
        y += 7;
      }
      const blob = doc.output("blob");
      const fileName = `${(enterprise.enterpriseName || "IELA-report").replace(/\s+/g, "_")}.pdf`;
      const file = new File([blob], fileName, { type: "application/pdf" });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: "IELA Credit Report", text: "Business analysis & bank loan assessment" });
        setShareStatus("shared");
      } else {
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        setShareStatus("downloaded");
      }
    } catch (e) {
      if (!(e && e.name === "AbortError")) setShareStatus("error");
    } finally {
      setPdfBusy(false);
    }
  }

  }

  const missingRequired = () => {
    if (step === 0) return [!identity.shgName && "Name of SHG", !identity.memberName && "Member Name"].filter(Boolean);
    if (step === 1) return [!enterprise.enterpriseName && "Enterprise Name", loanF.loanRequested === "" && "Loan Amount Requested"].filter(Boolean);
    return [];
  };

  const monthsTotal = num(h1.high.months) + num(h1.low.months) + num(h1.avg.months);
  const monthsDiff = 12 - monthsTotal;

  const hardBlockReason = () => {
    if (step === 0) {
      const pending = DOCUMENTS.filter((d) => documents[d.k].status !== "Collected" && documents[d.k].status !== "Not Applicable").map((d) => d.l.split(" / ")[0]);
      if (pending.length) return `All documents must be marked Collected (or Not Applicable) before continuing. Still pending: ${pending.join(", ")}. / आगे बढ़ने से पहले सभी दस्तावेज़ Collected होने चाहिए।`;
    }
    if (step === 2) {
      if (monthsTotal !== 12) return `High + Low + Average period months must add up to 12 (currently ${monthsTotal}, difference of ${monthsDiff > 0 ? monthsDiff + " short" : Math.abs(monthsDiff) + " over"}). / महीनों का कुल योग 12 होना चाहिए (वर्तमान: ${monthsTotal})।`;
    }
    return null;
  };

  const issues = useMemo(() => {
    const list = [];
    const missingMandatory = MEMBER_FIELDS.filter((f) => f.mandatory && !identity[f.k]).map((f) => f.l);
    if (missingMandatory.length)
      list.push({ tone: "warn", title: "Missing mandatory member details", detail: `${missingMandatory.join(", ")} not filled in.`, fix: "Complete these fields in Step 1 (Identity) — required for KYC and bank submission." });

    const pendingMandatoryDocs = DOCUMENTS.filter((d) => d.mandatory && documents[d.k].status !== "Collected").map((d) => d.l);
    if (pendingMandatoryDocs.length)
      list.push({ tone: "warn", title: "Mandatory documents not yet collected", detail: pendingMandatoryDocs.join(", "), fix: "Collect these before submitting the application to the bank." });

    if (calc.ownersCapital < 0)
      list.push({ tone: "danger", title: "Negative owner's capital", detail: `Total liabilities other than capital (${inr(calc.totalCL + calc.totalLTL)}) exceed total assets (${inr(calc.totalAssets)}) by ${inr(Math.abs(calc.ownersCapital))}.`, fix: "The business may be technically insolvent on paper. Re-check liability entries in Step 3, or this loan needs stronger justification before proceeding." });

    if (enterprise.premises !== "Rented" && num(h2.rent) > 0)
      list.push({ tone: "warn", title: "Rent booked but premises not marked Rented", detail: `Business Premises is "${enterprise.premises || "not set"}" but ${inr(num(h2.rent))} of Rent is booked in Income & Expenditure (Step 3).`, fix: "If rent is genuinely paid, set Business Premises to 'Rented' in Step 2. If the premises is owned, remove the Rent expense instead." });

    if (calc.cogs > calc.totalSales && calc.totalSales > 0)
      list.push({ tone: "warn", title: "Cost of Goods Sold exceeds Sales", detail: `COGS is ${inr(calc.cogs)} against Sales of ${inr(calc.totalSales)}.`, fix: "Re-check Opening Stock, Purchases, and Closing Stock (Balance Sheet) figures in Step 3 — one of these is likely overstated or understated." });

    if (calc.netProfit < 0)
      list.push({ tone: "danger", title: "Business is loss-making", detail: `Net loss of ${inr(Math.abs(calc.netProfit))} for the year.`, fix: "Review expenditure heads for overstatement, or hold off on this loan until margins improve." });

    if (calc.monthlyHouseholdSurplus < 0)
      list.push({ tone: "warn", title: "Household surplus is negative", detail: `Shortfall of ${inr(Math.abs(calc.monthlyHouseholdSurplus))}/month before any new loan.`, fix: "Reduce discretionary household expenses in Step 5, or confirm all income sources are captured." });

    if (calc.dscr > 0 && calc.dscr < 1.2)
      list.push({ tone: "warn", title: "DSCR below the safe threshold of 1.2", detail: `Current DSCR is ${calc.dscr.toFixed(2)}.`, fix: "Consider a longer tenure or a smaller loan amount to raise DSCR above 1.2." });

    if (calc.foir > 50)
      list.push({ tone: "warn", title: "FOIR above the 50% banking norm", detail: `Current FOIR is ${pct(calc.foir)}.`, fix: "Reduce the loan amount or extend tenure to bring EMI obligations below 50% of income." });

    if (calc.loanReq > calc.maxEligibleLoan && calc.maxEligibleLoan > 0)
      list.push({ tone: "danger", title: "Requested loan exceeds eligibility", detail: `Requested ${inr(calc.loanReq)} vs eligible ${inr(calc.maxEligibleLoan)}.`, fix: `Reduce the loan to ${inr(calc.maxEligibleLoan)}, or increase own contribution by ${inr(calc.loanReq - calc.maxEligibleLoan)}.` });

    if (calc.minTenureMonths === null && calc.loanReq > 0)
      list.push({ tone: "danger", title: "Loan may not be repayable at any tenure", detail: "Safe EMI capacity is too low to ever cover interest on the requested principal.", fix: "Reduce the loan amount substantially, or grow business/household income before proceeding." });

    const materialCost = num(tl.quotedPrice) + num(wc.totalWcRequired);
    if (materialCost > 0 && calc.loanReq >= materialCost * 0.98)
      list.push({ tone: "warn", title: "Loan amount looks like the full material/asset cost", detail: `Requested loan ${inr(calc.loanReq)} is almost equal to the material/asset cost of ${inr(materialCost)}.`, fix: `Margin money (min. 10%) should come from the applicant, not the loan. Loan Amount should be Cost − Margin ≈ ${inr(materialCost * 0.9)}, not the full cost.` });

    const wcEligible = Math.max(calc.tandonMethod2Mpbf, calc.turnoverBankFinance);
    if (num(wc.wcLoanAmount) > wcEligible && wcEligible > 0)
      list.push({ tone: "warn", title: "Working capital request exceeds assessed eligibility", detail: `Requested ${inr(num(wc.wcLoanAmount))} vs the higher of Tandon Method II (${inr(calc.tandonMethod2Mpbf)}) and Turnover Method (${inr(calc.turnoverBankFinance)}).`, fix: "Reduce the working capital loan amount to align with the bank assessment methods shown in Step 3, or provide justification for the higher requirement." });

    return list;
  }, [calc, identity, documents, wc, tl, enterprise, h2]);

  const contextSummary = `Step: ${STEPS[step]}. SHG: ${identity.shgName || "—"}. Enterprise: ${enterprise.enterpriseName || "—"}. Annual sales: ${inr(calc.totalSales)}. Net profit: ${inr(calc.netProfit)}. Loan requested: ${inr(calc.loanReq)}. Max eligible loan: ${inr(calc.maxEligibleLoan)}. DSCR: ${calc.dscr.toFixed(2)}. FOIR: ${pct(calc.foir)}. Recommendation: ${calc.recommendation}. Open issues: ${issues.length}.`;

  return (
    <div className="min-h-screen bg-stone-50 text-emerald-900" style={{ fontFamily: "'IBM Plex Sans', sans-serif" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
        .serif { font-family: 'Source Serif 4', serif; }
        .mono { font-family: 'IBM Plex Mono', monospace; }
        @media print { .no-print { display: none !important; } .print-area { box-shadow: none !important; } }
      `}</style>

      <div className="bg-emerald-900 text-stone-50 px-5 py-4 no-print">
        <div className="flex items-center justify-between">
          <div className="flex items-center gap-2">
            <Icon name="account_balance" size={20} className="text-amber-400" />
            <h1 className="serif text-lg font-bold tracking-wide">IELA Credit Advisor</h1>
          </div>
          <div className="flex items-center gap-1">
            <button
              onClick={() => {
                setBpmOpen(true);
                loadSubmissions();
              }}
              className="p-2 rounded-md hover:bg-emerald-800"
              aria-label="Saved Submissions"
            >
              <Icon name="group" size={19} />
            </button>
            <button onClick={() => setDiagOpen(true)} className="relative p-2 rounded-md hover:bg-emerald-800" aria-label="Health Check">
              <Icon name="checklist" size={19} />
              {issues.length > 0 && (
                <span className="absolute -top-0.5 -right-0.5 bg-amber-600 text-xs font-bold rounded-full w-4 h-4 flex items-center justify-center">
                  {issues.length}
                </span>
              )}
            </button>
            <button onClick={() => setChatOpen(true)} className="p-2 rounded-md hover:bg-emerald-800" aria-label="Chat">
              <Icon name="chat" size={19} />
            </button>
          </div>
        </div>
        <p className="text-xs text-emerald-100 mt-0.5">DAY-NRLM Annexure III — Enterprise Loan Business Analysis / उद्यम ऋण व्यवसाय विश्लेषण</p>
        <p className="text-xs text-amber-300 mt-0.5 font-medium">Developed by Anil Sharma, former General Manager, Central Bank of India</p>
        <p className="text-xs text-red-300 mt-1">■ Red text/values = calculated automatically — you don't need to type these yourself. / लाल रंग का पाठ स्वतः गणना होता है, इसे स्वयं भरने की आवश्यकता नहीं।</p>
      </div>

      <div className="flex overflow-x-auto no-print border-b border-stone-300 bg-stone-100">
        {STEPS.map((s, i) => (
          <button
            key={s}
            onClick={() => setStep(i)}
            className={`flex-1 text-center px-2 py-3 text-xs font-semibold border-b-2 transition-colors ${
              i === step ? "border-amber-600 text-emerald-900" : i < step ? "border-green-700 text-green-700" : "border-transparent text-stone-400"
            }`}
          >
            <span className="mono block text-xs mb-0.5">{String(i + 1).padStart(2, "0")}</span>
            {s}
          </button>
        ))}
      </div>

      <div className="max-w-md mx-auto p-4 pb-40">
        {step === 0 && (
          <section>
            <h2 className="serif text-xl font-bold mb-1">A/B. SHG & Member Identification / सदस्य पहचान</h2>
            <div className="flex gap-2 flex-wrap mb-3">
              <button onClick={loadSampleData} className="text-xs px-2 py-1 rounded-full border border-amber-600 text-amber-700 font-semibold whitespace-nowrap">
                Load Sample Data
              </button>
              <button onClick={exportData} className="text-xs px-2 py-1 rounded-full border border-emerald-900 text-emerald-900 font-semibold whitespace-nowrap">
                Export Data / डेटा निर्यात करें
              </button>
              <label className="text-xs px-2 py-1 rounded-full border border-emerald-900 text-emerald-900 font-semibold whitespace-nowrap cursor-pointer">
                Import Data / डेटा आयात करें
                <input type="file" accept=".json,application/json" className="hidden" onChange={(e) => e.target.files[0] && importData(e.target.files[0])} />
              </label>
              <button onClick={() => setDiagOpen(true)} className="text-xs px-2 py-1 rounded-full border border-teal-700 text-teal-700 font-semibold whitespace-nowrap">
                Health Check / स्वास्थ्य जांच {issues.length > 0 ? `(${issues.length})` : ""}
              </button>
              <button
                onClick={() => {
                  if (window.confirm("Delete ALL data in this app? This cannot be undone. / क्या सभी डेटा हटाना है? इसे वापस नहीं लाया जा सकता।")) deleteAllData();
                }}
                className="text-xs px-2 py-1 rounded-full border border-red-700 text-red-700 font-semibold whitespace-nowrap"
              >
                Delete All Data / सभी डेटा हटाएं
              </button>
            </div>
            {restoredFromAutosave && (
              <Banner tone="ok">Your previous data was automatically restored from this device. / आपका पिछला डेटा इस डिवाइस से स्वतः पुनर्स्थापित हो गया।</Banner>
            )}
            {importOk && <Banner tone="ok">Data imported successfully — check each step to confirm. / डेटा सफलतापूर्वक आयात हुआ।</Banner>}
            {importError && <Banner tone="danger">{importError}</Banner>}
            <p className="text-sm text-stone-600 mb-3">
              ★ = mandatory / अनिवार्य · Your entries are saved automatically on this device and remain even if you close the app — until you tap "Delete All Data." / आपकी प्रविष्टियां इस डिवाइस पर स्वतः सहेजी जाती हैं और तब तक बनी रहती हैं जब तक आप "Delete All Data" न दबाएं।
            </p>
            <SubHeading>A. SHG Details / एसएचजी विवरण</SubHeading>
            <FieldGrid fields={SHG_FIELDS} obj={identity} setObj={setIdentity} />
            <SubHeading>B. Member Identification / सदस्य पहचान</SubHeading>
            <FieldGrid fields={MEMBER_FIELDS} obj={identity} setObj={setIdentity} />

            <SubHeading>C. Documents Checklist / दस्तावेज़ सूची</SubHeading>
            <Card>
              {DOCUMENTS.map((d) => (
                <div key={d.k} className="py-2 border-b border-stone-200 last:border-0">
                  <div className="flex justify-between items-center">
                    <span className="text-sm">{d.l}{d.mandatory && <span className="text-red-700"> ★</span>}</span>
                    <select
                      value={documents[d.k].status}
                      onChange={(e) => setDocuments({ ...documents, [d.k]: { ...documents[d.k], status: e.target.value } })}
                      className="text-xs border border-stone-400 rounded-md px-1.5 py-1 bg-white"
                    >
                      {["Pending", "Collected", "Not Applicable"].map((o) => <option key={o}>{o}</option>)}
                    </select>
                  </div>
                </div>
              ))}
            </Card>
          </section>
        )}

        {step === 1 && (
          <section>
            <h2 className="serif text-xl font-bold mb-1">D/E/F. Enterprise & Loan</h2>
            <SubHeading>D. Enterprise Information / उद्यम जानकारी</SubHeading>
            <FieldGrid fields={ENTERPRISE_FIELDS} obj={enterprise} setObj={setEnterprise} />

            <SubHeading>E. Member Credit History with SHG & Banks / एसएचजी व बैंक ऋण इतिहास</SubHeading>
            <FieldGrid fields={CREDIT_HISTORY_FIELDS} obj={credit} setObj={setCredit} />

            <SubHeading>F1. Project Cost & Funding / परियोजना लागत व वित्तपोषण</SubHeading>
            <Banner tone="warn">
              Loan Amount = Total Project Cost − Margin Money (min. 10%). Fill the cost of material/asset in F2/F3 below first. / ऋण राशि = कुल परियोजना लागत − मार्जिन मनी (न्यूनतम 10%)। पूरी सामग्री लागत को ऋण राशि के रूप में न भरें।
            </Banner>
            <Field label="Total Project Cost (cost of material/asset — auto-fills from F2/F3 below)"><NumInput value={loanF.totalProjectCost} onChange={(v) => setLoanF({ ...loanF, totalProjectCost: v })} /></Field>
            <Field label="Margin Money – Min 10% (auto-suggested)"><NumInput value={loanF.marginMoney} onChange={(v) => setLoanF({ ...loanF, marginMoney: v })} /></Field>
            <Field label="Loan Amount Requested = Project Cost − Margin (auto-suggested, override if needed)" mandatory><NumInput value={loanF.loanRequested} onChange={(v) => setLoanF({ ...loanF, loanRequested: v })} /></Field>
            <FieldGrid fields={F1_FIELDS} obj={loanF} setObj={setLoanF} />

            <SubHeading>F2. Working Capital Details / कार्यशील पूंजी विवरण (केवल WC ऋण हेतु)</SubHeading>
            <FieldGrid fields={F2_FIELDS} obj={wc} setObj={setWc} />

            <SubHeading>F3. Term Loan Details / टर्म लोन विवरण (केवल TL ऋण हेतु)</SubHeading>
            <FieldGrid fields={F3_FIELDS} obj={tl} setObj={setTl} />
          </section>
        )}

        {step === 2 && (
          <section>
            <h2 className="serif text-xl font-bold mb-1">H. Financial Statement</h2>

            <SubHeading>Opening Stock / प्रारंभिक स्टॉक</SubHeading>
            <p className="text-xs text-stone-600 mb-2">
              Trading Account order: Opening Stock + Purchases − Closing Stock = COGS. Enter Opening Stock here, before Purchases below. Closing Stock is auto-linked later from the Balance Sheet (Raw Material + Finished Goods Stock) — no need to enter it twice.
            </p>
            <Field label="Opening Stock (value of stock at start of year)" help="Value of unsold raw material/finished goods stock you had at the beginning of the year. / वर्ष की शुरुआत में बचे हुए कच्चे माल/तैयार माल का मूल्य।">
              <NumInput value={openingStock} onChange={setOpeningStock} />
            </Field>

            <SubHeading>H1. Sales & Purchases / बिक्री व खरीद – पिछले 12 महीने</SubHeading>
            {["high", "low", "avg"].map((key) => {
              const row = calc.rows.find((r) => r.key === key);
              const periodLabel = key === "high" ? "High" : key === "low" ? "Low" : "Average";
              return (
                <div key={key} className="bg-white rounded-lg border border-stone-300 p-3 mb-3">
                  <p className="text-xs font-semibold text-stone-500 uppercase mb-2">
                    {key === "high" ? "High Sales Period" : key === "low" ? "Low Sales Period" : "Average Sales Period"}
                  </p>
                  <div className="grid grid-cols-2 gap-2">
                    <Field label="No. of Months"><NumInput prefix="#" value={h1[key].months} onChange={(v) => setH1({ ...h1, [key]: { ...h1[key], months: v } })} /></Field>
                    <Field label="Daily Sale (fill this, or leave blank and fill monthly instead)">
                      <NumInput value={h1[key].dailySale} onChange={(v) => setH1({ ...h1, [key]: { ...h1[key], dailySale: v } })} />
                    </Field>
                    {h1[key].dailySale !== "" ? (
                      <Field label={`Avg Monthly ${periodLabel} Sale`} auto>
                        <div className="mt-1 px-3 py-2 rounded-md bg-red-50 text-red-700 font-mono text-sm">{inr(row.avgMonthlySale)}</div>
                      </Field>
                    ) : (
                      <Field label={`Avg Monthly ${periodLabel} Sale (direct entry, since Daily Sale is blank)`}>
                        <NumInput value={h1[key].avgMonthlySaleManual} onChange={(v) => setH1({ ...h1, [key]: { ...h1[key], avgMonthlySaleManual: v } })} />
                      </Field>
                    )}
                    <Field label="Profit Margin %" mandatory><NumInput prefix="%" value={h1[key].margin} onChange={(v) => setH1({ ...h1, [key]: { ...h1[key], margin: v } })} /></Field>
                    <Field label="Avg Monthly Other Income"><NumInput value={h1[key].otherInc} onChange={(v) => setH1({ ...h1, [key]: { ...h1[key], otherInc: v } })} /></Field>
                  </div>
                </div>
              );
            })}
            {monthsTotal !== 12 && (
              <Banner tone="danger">
                Months must add up to 12 — currently {monthsTotal} ({monthsDiff > 0 ? `${monthsDiff} short` : `${Math.abs(monthsDiff)} too many`}). You cannot continue to the next step until this is fixed. / महीनों का योग 12 होना चाहिए।
              </Banner>
            )}
            <Card title="H1 Totals (auto)">
              <Row label="Avg Monthly Sale (blended, all periods)" value={inr(calc.avgMonthlySaleTotal)} auto />
              <Row label="Total Sales (12 months)" value={inr(calc.totalSales)} auto />
              <Row label="Blended Profit Margin %" value={pct(calc.blendedMargin)} auto />
              <Row label="Total Purchases" value={inr(calc.totalPurchases)} auto />
              <Row label="Total Other Income" value={inr(calc.totalOtherIncome)} auto last />
            </Card>

            <SubHeading>Trading Account: Gross Profit / व्यापार खाता: सकल लाभ</SubHeading>
            <p className="text-xs text-stone-600 mb-2">
              Cost of Goods Sold (COGS) = Opening Stock + Purchases − Closing Stock. This gives a more accurate Gross Profit than Sales − Purchases alone, since it accounts for unsold stock.
            </p>
            <Card>
              <Row label="Opening Stock" value={inr(num(openingStock))} />
              <Row label="+ Purchases (from H1)" value={inr(calc.totalPurchases)} auto />
              <Row label="− Closing Stock (auto, from Balance Sheet below)" value={inr(calc.closingStock)} auto />
              <Row label="= Cost of Goods Sold (COGS)" value={inr(calc.cogs)} bold auto />
              <Row label="Gross Profit (Sales − COGS)" value={inr(calc.grossProfit)} auto />
              <Row label="Gross Margin %" value={pct(calc.grossMargin)} bold last auto />
            </Card>
            {calc.cogs > calc.totalSales && calc.totalSales > 0 && (
              <Banner tone="warn">Cost of Goods Sold is higher than Sales — check Opening Stock, Purchases, and Closing Stock figures.</Banner>
            )}

            <SubHeading>H2. Income & Expenditure / आय व व्यय विवरण (वार्षिक)</SubHeading>
            <p className="text-xs text-stone-600 mb-2">Total Purchases and Total Sales are auto-linked from H1.</p>
            <NumList fields={H2_EXPENDITURE_FIELDS} obj={h2} setObj={setH2} />
            <Field label="Government Subsidy / Grant Received"><NumInput value={govtSubsidy} onChange={setGovtSubsidy} /></Field>
            {num(h2.wages) + num(h2.familyLabour) > calc.totalSales && calc.totalSales > 0 && (
              <Banner tone="warn">Some expenditure heads look high relative to sales — please double check.</Banner>
            )}
            <Card>
              <Row label="Total Expenditure (A)" value={inr(calc.totalExpenditure)} auto />
              <Row label="Total Income (B)" value={inr(calc.totalIncome)} auto />
              <Row label="Net Profit / (Loss) [B − A]" value={inr(calc.netProfit)} bold last auto />
            </Card>
            {calc.netProfit < 0 && <Banner tone="danger">This shows a net loss for the year — repayment capacity will be weak.</Banner>}

            <SubHeading>H3. Balance Sheet / तुलन पत्र</SubHeading>
            <p className="text-xs font-semibold text-stone-500 mb-1">A. Current Liabilities</p>
            <NumList
              fields={CL_FIELDS}
              obj={h3}
              setObj={setH3}
              extraRows={[
                { label: "SHG Loan Outstanding (auto, from Section E)", value: inr(num(credit.shgLoanOutstanding)) },
                { label: "Informal Loan (auto, from Section E)", value: inr(num(credit.informalLoan)) },
              ]}
            />

            <p className="text-xs font-semibold text-stone-500 mb-1 mt-3">B. Long-Term Liabilities</p>
            <NumList
              fields={LTL_FIELDS}
              obj={h3}
              setObj={setH3}
              extraRows={[{ label: "Bank Term Loan Outstanding (auto, from Section E)", value: inr(num(credit.bankLoanOutstanding)) }]}
            />

            <p className="text-xs font-semibold text-stone-500 mb-1 mt-3">A. Current Assets</p>
            <NumList
              fields={CA_FIELDS}
              obj={h3}
              setObj={setH3}
              extraRows={[
                { label: "Savings with SHG (auto, from Section E)", value: inr(num(credit.cumulativeShgSavings)) },
                { label: "Cash in Bank – Own SB A/c (auto, from Section E)", value: inr(num(credit.ownSbSavings)) },
                { label: "FD / RD with Bank (auto, from Section E)", value: inr(num(credit.fdRd)) },
                { label: "Other Savings / Investment (auto, from Section E)", value: inr(num(credit.otherSavings)) },
              ]}
            />

            <p className="text-xs font-semibold text-stone-500 mb-1 mt-3">B. Fixed Assets</p>
            <NumList fields={FA_FIELDS} obj={h3} setObj={setH3} />

            <p className="text-xs font-semibold text-stone-500 mb-1 mt-3">C. Other Assets</p>
            <NumList fields={OA_FIELDS} obj={h3} setObj={setH3} />

            <Field label="Drawings by Owner (memo only — not netted into capital)"><NumInput value={drawings} onChange={setDrawings} /></Field>

            <Card title="Balance Sheet Summary (auto)">
              <Row label="Total Current Liabilities" value={inr(calc.totalCL)} auto />
              <Row label="Total Long-Term Liabilities" value={inr(calc.totalLTL)} auto />
              <Row label="Owner's Capital = Total Assets − Liabilities other than capital" value={inr(calc.ownersCapital)} bold auto />
              <Row label="TOTAL LIABILITIES" value={inr(calc.totalLiabilities)} auto />
              <Row label="Total Current Assets" value={inr(calc.totalCA)} auto />
              <Row label="Total Fixed Assets" value={inr(calc.totalFA)} auto />
              <Row label="Total Other Assets" value={inr(calc.totalOA)} auto />
              <Row label="TOTAL ASSETS" value={inr(calc.totalAssets)} bold last auto />
            </Card>
            {calc.ownersCapital >= 0 ? (
              <Banner tone="ok">Owner's Capital works out to {inr(calc.ownersCapital)} — assets comfortably cover liabilities other than capital.</Banner>
            ) : (
              <Banner tone="danger">Owner's Capital is negative ({inr(calc.ownersCapital)}) — liabilities other than capital exceed total assets. Re-check entries; this points to technical insolvency.</Banner>
            )}
            <p className="text-xs text-stone-600 mb-4">Memo (not part of the capital formula): Net Profit for the year {inr(calc.netProfit)} · Drawings {inr(num(drawings))}.</p>

            <SubHeading>Working Capital Assessment / कार्यशील पूंजी मूल्यांकन</SubHeading>
            <p className="text-xs text-stone-600 mb-2">Two standard bank methods, computed from the Balance Sheet above.</p>

            <Card title="Tandon Committee Method">
              <Row label="Current Assets" value={inr(calc.totalCA)} auto />
              <Row label="Current Liabilities other than bank borrowings" value={inr(calc.clOtherThanBankBorrowings)} auto />
              <Row label="Working Capital Gap (CA − CL)" value={inr(calc.workingCapitalGap)} last auto />
            </Card>
            <Card title="Method I — MPBF = 75% of Working Capital Gap">
              <Row label="Maximum Permissible Bank Finance (MPBF)" value={inr(calc.tandonMethod1Mpbf)} auto />
              <Row label="Required Net Working Capital (25%, from long-term sources)" value={inr(calc.tandonMethod1Nwc)} last auto />
            </Card>
            <Card title="Method II — MPBF = 75% of CA − CL other than bank borrowings">
              <Row label="Maximum Permissible Bank Finance (MPBF)" value={inr(calc.tandonMethod2Mpbf)} auto />
              <Row label="Required Net Working Capital (25% of CA)" value={inr(calc.tandonMethod2Nwc)} last auto />
            </Card>

            <Card title="Turnover Method (Nayak Committee)">
              <Field label="Projected Annual Turnover — override" help="Defaults to Annual Sales from H1; override if the projected turnover differs. / डिफ़ॉल्ट रूप से H1 की वार्षिक बिक्री; भिन्न होने पर बदलें।">
                <NumInput value={projectedTurnoverOverride} onChange={setProjectedTurnoverOverride} />
              </Field>
              <p className="text-xs text-stone-600 -mt-2 mb-2">Using: {inr(calc.projectedTurnover)} unless overridden.</p>
              <Row label="Working Capital Requirement (25% of turnover)" value={inr(calc.turnoverWcRequirement)} auto />
              <Row label="Borrower's Margin (5% of turnover)" value={inr(calc.turnoverMargin)} auto />
              <Row label="Bank Finance (20% of turnover)" value={inr(calc.turnoverBankFinance)} bold last auto />
            </Card>
            <Banner tone="warn">
              Turnover Method typically applies for limits up to ₹5 crore (most SHG enterprise loans); Tandon Method is used for larger working capital limits. Use these figures to set the Working Capital Loan Amount in Step 2 (Enterprise & Loan → F2).
            </Banner>
          </section>
        )}

        {step === 3 && (
          <section>
            <h2 className="serif text-xl font-bold mb-1">I. Future Business Projections</h2>
            <p className="text-sm text-stone-600 mb-4">Current year figures are auto-linked from Financials. Enter growth % for Year 2 & 3.</p>
            <Card title="Current Year (Actual, auto)">
              <Row label="Sales" value={inr(calc.totalSales)} auto />
              <Row label="Purchases / COGS" value={inr(calc.totalPurchases)} auto />
              <Row label="Operating Expenditure" value={inr(calc.totalExpenditure - calc.totalPurchases)} auto />
              <Row label="Net Profit / (Loss)" value={inr(calc.netProfitY1)} last auto />
            </Card>
            <Field label="Sales Growth % – Year 2"><NumInput prefix="%" value={proj.growthSalesY2} onChange={(v) => setProj({ ...proj, growthSalesY2: v })} /></Field>
            <Field label="Sales Growth % – Year 3"><NumInput prefix="%" value={proj.growthSalesY3} onChange={(v) => setProj({ ...proj, growthSalesY3: v })} /></Field>
            <Field label="Operating Expenditure Growth % – Year 2"><NumInput prefix="%" value={proj.growthOpexY2} onChange={(v) => setProj({ ...proj, growthOpexY2: v })} /></Field>
            <Field label="Operating Expenditure Growth % – Year 3"><NumInput prefix="%" value={proj.growthOpexY3} onChange={(v) => setProj({ ...proj, growthOpexY3: v })} /></Field>

            <Card title="Year 2 (Projected, auto)">
              <Row label="Sales" value={inr(calc.salesY2)} />
              <Row label="Purchases / COGS" value={inr(calc.purchasesY2)} auto />
              <Row label="Operating Expenditure" value={inr(calc.opexY2)} auto />
              <Row label="Net Profit / (Loss)" value={inr(calc.netProfitY2)} last auto />
            </Card>
            <Card title="Year 3 (Projected, auto)">
              <Row label="Sales" value={inr(calc.salesY3)} />
              <Row label="Purchases / COGS" value={inr(calc.purchasesY3)} auto />
              <Row label="Operating Expenditure" value={inr(calc.opexY3)} auto />
              <Row label="Net Profit / (Loss)" value={inr(calc.netProfitY3)} last auto />
            </Card>
            <Banner tone="warn">
              The original workbook's Projections and Surplus rows didn't recompute from Year 2/3 inputs — this prototype fixes that so all three years respond to the growth assumptions above.
            </Banner>
          </section>
        )}

        {step === 4 && (
          <section>
            <h2 className="serif text-xl font-bold mb-1">K. Household Information</h2>
            <SubHeading>K1. Household Profile / पारिवारिक प्रोफ़ाइल</SubHeading>
            <FieldGrid fields={K1_FIELDS} obj={k1} setObj={setK1} />

            <SubHeading>K2. Household Income / पारिवारिक आय (वार्षिक)</SubHeading>
            <NumList
              fields={K2_INCOME_FIELDS}
              obj={hhInc}
              setObj={setHhInc}
              extraRow={{ label: "Income from Business (auto-linked to Net Profit)", value: inr(Math.max(calc.avgMonthlyNetProfit * 12, 0)) }}
            />

            <SubHeading>K2. Household Expenditure / पारिवारिक व्यय (वार्षिक)</SubHeading>
            <NumList
              fields={K2_EXPENDITURE_FIELDS}
              obj={hhExp}
              setObj={setHhExp}
              extraRows={[
                { label: "EMI – SHG Loan (auto, from Section E)", value: inr(num(credit.shgEmi) * 12) },
                { label: "EMI – Bank Loan (auto, from Section E)", value: inr(num(credit.bankLoanEmi) * 12) },
              ]}
            />

            <Card title="Household Summary (auto)">
              <Row label="Total Household Income (A)" value={inr(calc.hhIncomeTotalWithBiz)} auto />
              <Row label="Total Household Expenditure (B)" value={inr(calc.hhExpTotal)} auto />
              <Row label="Household Surplus (A − B), annual" value={inr(calc.householdSurplusAnnual)} bold last auto />
            </Card>
            {calc.monthlyHouseholdSurplus < 0 && <Banner tone="warn">Household expenses exceed income before any new loan — this will limit eligibility.</Banner>}

            <SubHeading>K3. Loan EMI Repayment Schedule / ऋण ईएमआई अनुसूची (मासिक)</SubHeading>
            <Card>
              <Row label="EMI – SHG Loan (auto)" value={inr(calc.existingEmiShg)} auto />
              <Row label="EMI – Existing Bank Loan (auto)" value={inr(num(credit.bankLoanEmi))} auto />
              <Row label="EMI – Proposed New Loan (as declared)" value={inr(num(loanF.proposedEmi))} />
              <Row label="TOTAL MONTHLY EMI" value={inr(calc.totalMonthlyEmi)} bold auto />
              <Row label="Net Cash Surplus After All EMIs" value={inr(calc.netCashSurplusAfterAllEmis)} bold last auto />
            </Card>
          </section>
        )}

        {step === 5 && (
          <section>
            <h2 className="serif text-xl font-bold mb-1">L. Loan Repayment Feasibility</h2>
            <SubHeading>L1. Input Data / इनपुट डेटा</SubHeading>
            <Card>
              <Row label="Proposed Loan Amount (auto)" value={inr(calc.loanReq)} />
              <Row label="Repayment Period (auto)" value={`${loanF.tenureMonths} months`} />
              <Row label="Annual Interest Rate (auto)" value={pct(num(loanF.interestRate))} last />
            </Card>
            <Field label="Monthly Household Income – override" help="Defaults to the Household step's figure; override if needed. / डिफ़ॉल्ट रूप से पारिवारिक चरण का आंकड़ा; आवश्यकता होने पर बदलें।">
              <NumInput value={emiL1.monthlyHHIncomeOverride} onChange={(v) => setEmiL1({ ...emiL1, monthlyHHIncomeOverride: v })} />
            </Field>
            <p className="text-xs text-stone-600 -mt-2 mb-3">Using: {inr(calc.monthlyHHIncome)} unless overridden.</p>
            <Field label="Monthly Household Expenditure – override">
              <NumInput value={emiL1.monthlyHHExpenditureOverride} onChange={(v) => setEmiL1({ ...emiL1, monthlyHHExpenditureOverride: v })} />
            </Field>
            <p className="text-xs text-stone-600 -mt-2 mb-3">Using: {inr(calc.emiMonthlyHHExpenditureExclEmi)} unless overridden (household expenditure excluding existing EMIs, since those are added back separately below — avoids double-counting).</p>
            <Field label="Existing Monthly EMI – Bank / Other – override">
              <NumInput value={emiL1.existingEmiBankOverride} onChange={(v) => setEmiL1({ ...emiL1, existingEmiBankOverride: v })} />
            </Field>
            <p className="text-xs text-stone-600 -mt-2 mb-3">Existing EMI – SHG (auto): {inr(calc.existingEmiShg)}</p>

            <SubHeading>L2. Auto-Calculated EMI & Feasibility / स्वतः गणना की गई ईएमआई</SubHeading>
            <Card>
              <Row label="Calculated Monthly EMI on Proposed Loan (PMT)" value={inr(calc.calculatedEmi)} auto />
              <Row label="Total Existing Monthly EMIs" value={inr(calc.totalExistingEmi)} auto />
              <Row label="Monthly Surplus BEFORE New EMI" value={inr(calc.surplusBeforeNewEmi)} auto />
              <Row label="Surplus AFTER New EMI" value={inr(calc.surplusAfterNewEmi)} bold auto />
              <Row label="DSCR" value={calc.dscr.toFixed(2)} auto />
              <Row label="FOIR" value={pct(calc.foir)} last auto />
            </Card>
            {calc.surplusAfterNewEmi < 0 ? (
              <Banner tone="danger">Not viable at the requested terms — shortfall of {inr(Math.abs(calc.surplusAfterNewEmi))}. See suggestions below.</Banner>
            ) : (
              <Banner tone="ok">Viable — surplus of {inr(calc.surplusAfterNewEmi)} remains after the new EMI.</Banner>
            )}

            <SubHeading>L3. Smart Suggestions / स्मार्ट सुझाव</SubHeading>
            <p className="text-xs text-stone-600 mb-2">Safe EMI capacity = 50% of surplus before new EMI (buffer for household emergencies).</p>
            <Card>
              <Row label="Safe Monthly EMI Capacity" value={inr(calc.safeEmiCapacity)} last auto />
            </Card>
            <Card title="Suggestion A — Maximum Loan Affordable (same tenure & rate)">
              <Row label="Maximum Loan Amount that can be Sanctioned" value={inr(calc.maxEligibleLoan)} last auto />
            </Card>
            <Card title="Suggestion B — Minimum Tenure Required (same loan amount & rate)">
              <Row label="Minimum Tenure Required" value={calc.minTenureMonths ? `${calc.minTenureMonths} months` : "Not achievable at this EMI capacity"} last auto />
            </Card>
            {calc.recommendation === "Not Recommended" && (
              calc.minTenureMonths && calc.minTenureMonths <= 60 ? (
                <Banner tone="warn">
                  Suggestion: this loan becomes viable if the repayment period is extended to about {calc.minTenureMonths} months (within the 60-month maximum), instead of the current {loanF.tenureMonths} months — this can be edited on Step 2 after review, if needed. / सुझाव: पुनर्भुगतान अवधि लगभग {calc.minTenureMonths} महीने करने पर यह ऋण व्यवहार्य हो सकता है।
                </Banner>
              ) : (
                <Banner tone="danger">
                  Even extending the repayment period to 60 months (the maximum) would not make this loan viable at the current EMI capacity — the loan amount itself needs to be reduced, or household/business surplus needs to improve. / 60 महीने तक बढ़ाने पर भी यह ऋण व्यवहार्य नहीं होगा — ऋण राशि घटानी होगी।
                </Banner>
              )
            )}
          </section>
        )}

        {step === 6 && (
          <>
            <Report identity={identity} enterprise={enterprise} credit={credit} loanF={loanF} calc={calc} />
            <div className="mt-4 no-print space-y-2">
              <div className="flex gap-2">
                <button onClick={shareAsText} className="flex-1 flex items-center justify-center gap-2 px-4 py-2 rounded-md border border-emerald-900 text-emerald-900 text-sm font-semibold">
                  <Icon name="share" size={16} /> Share / साझा करें
                </button>
                <button onClick={shareAsPdf} disabled={pdfBusy} className="flex-1 flex items-center justify-center gap-2 px-4 py-2 rounded-md border border-amber-600 text-amber-700 text-sm font-semibold disabled:opacity-40">
                  {pdfBusy ? <Icon name="progress_activity" size={16} className="animate-spin" /> : <Icon name="download" size={16} />} Share PDF / पीडीएफ साझा करें
                </button>
              </div>
              {shareStatus === "shared" && <p className="text-xs text-green-800">Shared successfully via your phone's share sheet.</p>}
              {shareStatus === "copied" && <p className="text-xs text-stone-600">Sharing isn't available here, so the summary was copied to your clipboard instead — paste it into WhatsApp, SMS, or email.</p>}
              {shareStatus === "downloaded" && <p className="text-xs text-stone-600">PDF downloaded to your device — share it from your Files/Downloads app.</p>}
              {shareStatus === "pdf-unavailable" && <p className="text-xs text-red-700">Couldn't load the PDF tool (needs an internet connection). Try "Share" (text) instead, or use Print Report below.</p>}
              {shareStatus === "error" && <p className="text-xs text-red-700">Something went wrong — please try again.</p>}

              <Banner tone="warn">This saves a summary (names, loan figures, DSCR/FOIR, recommendation) on this device only, so you can review past applications later. To send it to a BPM, use Share / Share PDF above.</Banner>
              <button onClick={submitToBPM} className="w-full flex items-center justify-center gap-2 px-4 py-2 rounded-md bg-emerald-900 text-stone-50 text-sm font-semibold">
                <Icon name="send" size={16} /> Save Submission (this device)
              </button>
              {submitStatus === "saving" && <p className="text-xs text-stone-600 mt-2">Sharing…</p>}
              {submitStatus === "saved" && <p className="text-xs text-green-800 mt-2">Saved — visible under the Submissions icon (👥) in the header, on this device.</p>}
              {submitStatus === "error" && <p className="text-xs text-red-700 mt-2">Couldn't share — please try again.</p>}
            </div>
          </>
        )}
      </div>

      <div className="fixed bottom-0 left-0 right-0 bg-stone-100 border-t border-stone-300 px-4 py-3 no-print">
        <div className="max-w-md mx-auto">
          {hardBlockReason() && <p className="text-xs text-red-700 font-semibold mb-2">{hardBlockReason()}</p>}
          {!hardBlockReason() && step < STEPS.length - 1 && missingRequired().length > 0 && (
            <p className="text-xs text-amber-800 mb-2">Not filled yet / अभी भरा नहीं गया: {missingRequired().join(", ")} — you can still continue and fill these later. / आप बाद में भी भर सकते हैं।</p>
          )}
          <div className="flex gap-3">
            {step > 0 && (
              <button onClick={() => setStep(step - 1)} className="flex items-center gap-1 px-4 py-2 rounded-md border border-stone-400 text-emerald-900 text-sm font-medium">
                <Icon name="chevron_left" size={16} /> Back / पीछे
              </button>
            )}
            {step < STEPS.length - 1 ? (
              <button
                onClick={() => setStep(step + 1)}
                disabled={!!hardBlockReason()}
                className="flex-1 flex items-center justify-center gap-1 px-4 py-2 rounded-md bg-emerald-900 text-stone-50 text-sm font-semibold disabled:opacity-40"
              >
                Next / आगे <Icon name="chevron_right" size={16} />
              </button>
            ) : (
              <button onClick={() => window.print()} className="flex-1 flex items-center justify-center gap-2 px-4 py-2 rounded-md bg-amber-600 text-white text-sm font-semibold">
                <Icon name="print" size={16} /> Print Report / रिपोर्ट प्रिंट करें
              </button>
            )}
          </div>
        </div>
      </div>

      <button
        onClick={() => setChatOpen(true)}
        className="no-print fixed bottom-24 right-4 pl-3 pr-4 py-2.5 rounded-full bg-amber-600 text-white shadow-lg flex items-center gap-2 z-30"
        aria-label="Ask a question"
      >
        <Icon name="chat" size={18} />
        <span className="text-sm font-semibold">Ask a question</span>
      </button>

      <ChatWidget open={chatOpen} onClose={() => setChatOpen(false)} contextSummary={contextSummary} step={step} issues={issues} />
      <DiagnosticsPanel open={diagOpen} onClose={() => setDiagOpen(false)} issues={issues} />
      <BPMPanel open={bpmOpen} onClose={() => setBpmOpen(false)} submissions={submissions} loading={submissionsLoading} error={submissionsError} onRefresh={loadSubmissions} />
    </div>
  );
}

function Stamp({ recommendation, tone }) {
  const color = tone === "ok" ? "#4C7A51" : tone === "warn" ? "#C08A2E" : "#A63D40";
  return (
    <div className="w-28 h-28 rounded-full border-4 flex items-center justify-center text-center p-2 mx-auto" style={{ borderColor: color, color, transform: "rotate(-8deg)" }}>
      <span className="serif font-bold text-xs leading-tight uppercase">{recommendation}</span>
    </div>
  );
}

function Report({ identity, enterprise, credit, loanF, calc }) {
  return (
    <div className="print-area bg-white border border-stone-300 rounded-lg p-5 shadow-sm">
      <div className="text-center mb-4">
        <p className="text-xs tracking-widest text-stone-500 uppercase">Business Analysis & Bank Loan Assessment Report</p>
        <h2 className="serif text-lg font-bold mt-1">{enterprise.enterpriseName || "Enterprise Name"}</h2>
        <p className="text-xs text-stone-600">{identity.memberName} · {identity.shgName}</p>
      </div>

      <SubHeading>1. Applicant Details / आवेदक विवरण</SubHeading>
      <Row label="Business Activity" value={enterprise.currentActivity || "—"} />
      <Row label="Experience" value={`${enterprise.experience || 0} yrs`} />
      <Row label="Existing Bank" value={identity.bankName || "—"} />
      <Row label="Existing SHG Loan Outstanding" value={inr(num(credit.shgLoanOutstanding))} last />

      <SubHeading>2. Business Performance / व्यवसाय प्रदर्शन</SubHeading>
      <Row label="Annual Sales" value={inr(calc.totalSales)} auto />
      <Row label="Cost of Goods Sold (COGS)" value={inr(calc.cogs)} auto />
      <Row label="Gross Profit" value={inr(calc.grossProfit)} auto />
      <Row label="Gross Margin" value={pct(calc.grossMargin)} auto />
      <Row label="Net Profit" value={inr(calc.netProfit)} auto />
      <Row label="Net Margin" value={pct(calc.netMargin)} />
      <Row label="Avg Monthly Net Profit" value={inr(calc.avgMonthlyNetProfit)} last auto />

      <SubHeading>3. Household Assessment / पारिवारिक मूल्यांकन</SubHeading>
      <Row label="Monthly Household Income" value={inr(calc.monthlyHHIncome)} />
      <Row label="Monthly Household Expenditure" value={inr(calc.monthlyHHExpenditure)} />
      <Row label="Monthly Household Surplus" value={inr(calc.monthlyHouseholdSurplus)} last auto />

      <SubHeading>4. Proposed Investment / प्रस्तावित निवेश</SubHeading>
      <Row label="Purpose" value={loanF.facilityType} />
      <Row label="Total Project Cost" value={inr(loanF.totalProjectCost)} />
      <Row label="Margin Money" value={inr(loanF.marginMoney)} />
      <Row label="Loan Requested" value={inr(calc.loanReq)} last />

      <SubHeading>5. Bank Credit Analysis / बैंक ऋण विश्लेषण</SubHeading>
      <Row label="Safe EMI Capacity" value={inr(calc.safeEmiCapacity)} auto />
      <Row label="Calculated Monthly EMI" value={inr(calc.calculatedEmi)} auto />
      <Row label="DSCR" value={calc.dscr.toFixed(2)} auto />
      <Row label="FOIR" value={pct(calc.foir)} auto />
      <Row label="Maximum Eligible Loan" value={inr(calc.maxEligibleLoan)} last auto />

      <SubHeading>5a. Working Capital Assessment / कार्यशील पूंजी मूल्यांकन</SubHeading>
      <Row label="Tandon Method I — MPBF" value={inr(calc.tandonMethod1Mpbf)} auto />
      <Row label="Tandon Method II — MPBF" value={inr(calc.tandonMethod2Mpbf)} auto />
      <Row label="Turnover Method — Bank Finance (20% of turnover)" value={inr(calc.turnoverBankFinance)} last auto />
      <Row label="Owner's Capital" value={inr(calc.ownersCapital)} last />

      <SubHeading>6. Bank Officer's Decision / बैंक अधिकारी का निर्णय</SubHeading>
      <div className="my-4"><Stamp recommendation={calc.recommendation} tone={calc.tone} /></div>

      <SubHeading>7. AI Guidance / एआई मार्गदर्शन</SubHeading>
      <ul className="text-sm space-y-1.5 list-disc pl-4 text-stone-800">
        {calc.netProfit >= 0 ? (
          <li>Your business generates a net profit of {inr(calc.netProfit)} a year, supporting repayment capacity.</li>
        ) : (
          <li>Your business shows a net loss this year — repayment capacity is weak until this improves.</li>
        )}
        {calc.ownersCapital < 0 && <li>Owner's capital works out negative — liabilities other than capital exceed total assets; treat this report as provisional until resolved.</li>}
        {calc.monthlyHouseholdSurplus < 0 && <li>Household expenses currently exceed income; reducing expenses will improve eligibility.</li>}
        {calc.loanReq > calc.maxEligibleLoan ? (
          <li>Your proposed loan of {inr(calc.loanReq)} exceeds repayment capacity of {inr(calc.maxEligibleLoan)}. Consider reducing the loan or increasing own contribution.</li>
        ) : (
          <li>Based on your financial data, the estimated sanctionable amount is {inr(calc.maxEligibleLoan)}.</li>
        )}
        {calc.recommendation === "Not Recommended" && calc.minTenureMonths && calc.minTenureMonths <= 60 && (
          <li>Alternative: extending the repayment period to about {calc.minTenureMonths} months (within the 60-month maximum) would make this loan viable at the current EMI capacity — editable on Step 2 if the applicant agrees.</li>
        )}
        <li>Expected monthly EMI: {inr(calc.calculatedEmi)}.</li>
        <li>FOIR is {pct(calc.foir)} — {calc.foir <= 50 ? "within acceptable banking norms." : "above typical banking comfort levels (50%)."}</li>
      </ul>
      <p className="text-center text-xs text-stone-400 mt-6 pt-3 border-t border-stone-200">Developed by Anil Sharma, former General Manager, Central Bank of India</p>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>

<script>
  function showBootError(title, message, detail) {
    var root = document.getElementById("root");
    root.innerHTML =
      '<div style="padding:20px;font-family:sans-serif;color:#7c2b2d;background:#fef2f2;min-height:100vh;">' +
      '<h2 style="margin-top:0;">' + title + '</h2>' +
      '<p style="white-space:pre-wrap;">' + (message || "Unknown error") + '</p>' +
      (detail ? '<pre style="font-size:11px;color:#994444;white-space:pre-wrap;overflow:auto;border-top:1px solid #f3c4c4;padding-top:10px;">' + detail + '</pre>' : "") +
      '<p style="font-size:12px;color:#777;margin-top:16px;">If you\'re the developer: open this page\'s browser console (or Safari/Chrome remote inspector) for the full stack trace.</p>' +
      '</div>';
  }

  window.addEventListener("error", function (e) {
    var root = document.getElementById("root");
    if (root && !root.hasAttribute("data-app-loaded")) {
      showBootError("Something went wrong", e.message, e.error && e.error.stack);
    }
  });
  window.addEventListener("unhandledrejection", function (e) {
    var root = document.getElementById("root");
    if (root && !root.hasAttribute("data-app-loaded")) {
      showBootError("Something went wrong (async)", e.reason && e.reason.message ? e.reason.message : String(e.reason));
    }
  });

  (function boot() {
    if (typeof React === "undefined" || typeof ReactDOM === "undefined" || typeof Babel === "undefined") {
      var missing = [
        typeof React === "undefined" ? "React" : null,
        typeof ReactDOM === "undefined" ? "ReactDOM" : null,
        typeof Babel === "undefined" ? "Babel" : null,
      ].filter(Boolean).join(", ");
      showBootError(
        "Couldn't load required scripts",
        "This page needs " + missing + " to load from an external CDN (cdnjs.cloudflare.com), but it didn't arrive. This usually means no internet connection, or that CDN is blocked on this network/browser.",
        "Try: checking your internet connection, switching networks/Wi-Fi, or opening this page in a regular browser (Safari/Chrome) instead of an in-app preview."
      );
      return;
    }
    var source = document.getElementById("app-source").textContent;
    var transformed;
    try {
      transformed = Babel.transform(source, { presets: ["react"] }).code;
    } catch (compileErr) {
      showBootError("Couldn't load the app (code error)", compileErr.message, compileErr.stack);
      return;
    }
    try {
      (0, eval)(transformed);
      document.getElementById("root").setAttribute("data-app-loaded", "true");
    } catch (runtimeErr) {
      showBootError("Couldn't start the app (runtime error)", runtimeErr.message, runtimeErr.stack);
    }
  })();
</script>
